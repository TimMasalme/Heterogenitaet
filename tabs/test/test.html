<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LdL · Kurstest · Heterogenität</title>
  <link rel="icon" type="image/svg+xml" href="../../meta/favicon/heterogenitaet-fav.svg" />  <link rel="stylesheet" href="../../meta/styles.css" />
  <link rel="stylesheet" href="../../meta/components/components.css" />
  <link rel="stylesheet" href="test.css" />
</head>
<body class="app-shell">

  <div id="app-topbar"></div>

  <!-- Firebase-Verbindungsfehler (wird per JS eingeblendet) -->
  <div id="firebaseErrorBanner" style="
    display:none; background:#C1440E; color:#fff;
    text-align:center; padding:10px 16px;
    font-family:'DM Sans',sans-serif; font-size:.88rem;
    position:sticky; top:66px; z-index:100;
  "></div>

  <div class="layout">
    <div class="sidebar-slot"></div>

    <main class="content">
      <div class="content-inner">

        <div class="content-grid">
          <section class="questions-area" id="questionsContainer"></section>
          <aside class="progress-rail">
            <div class="progress-label">
              <span id="progressText">0 / 8</span>
            </div>
            <div class="progress-track">
              <div class="progress-fill" id="progressFill"></div>
            </div>
          </aside>
        </div>

        <div class="submit-row">
          <div class="offene-frage-wrap">
            <label class="offene-frage-label" for="offeneFrage">
              Noch etwas unklar? <span class="offene-frage-optional">(optional)</span>
            </label>
            <textarea
              id="offeneFrage"
              class="offene-frage-textarea"
              placeholder="z.B. „Den Pygmalion-Effekt habe ich noch nicht ganz verstanden …“"
              maxlength="400"
              rows="3"
            ></textarea>
          </div>
          <button class="submit-btn" onclick="submitAll()">Antworten senden</button>
        </div>

      </div><!-- /content-inner -->
    </main>
  </div>

  <div id="app-footer"></div>

  <div class="overlay hidden" id="doneOverlay">
    <div class="overlay-card">
      <div class="done-check">✓</div>
      <h2>Übermittelt</h2>
      <p>Deine Antworten wurden gespeichert.<br>Warte auf die gemeinsame Auswertung.</p>
    </div>
  </div>

  <script type="module" src="../../meta/firebase.js"
          onerror="var b=document.getElementById('firebaseErrorBanner');if(b){b.textContent='⚠ Server nicht erreichbar. Bitte WLAN/Netz prüfen und Seite neu laden.';b.style.display='block';}"></script>
  <script src="../../meta/questions.js"></script>
  <script src="test.js"></script>
  <script src="../../meta/components/components.js"></script>
</body>
</html>
