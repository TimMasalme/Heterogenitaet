<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LdL · Kurstest · Heterogenität</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../meta/styles.css" />
  <link rel="stylesheet" href="../../meta/components/components.css" />
  <link rel="stylesheet" href="test.css" />
</head>
<body class="app-shell">

  <div id="app-topbar"></div>

  <div class="layout">
    <div class="sidebar-slot"></div>

    <main class="content">
      <div class="content-inner">

        <div class="content-grid">
          <section class="questions-area" id="questionsContainer"></section>
          <aside class="progress-rail">
            <div class="progress-label">
              <span id="progressText">0 / 8</span>
            </div>
            <div class="progress-track">
              <div class="progress-fill" id="progressFill"></div>
            </div>
          </aside>
        </div>

        <div class="submit-row">
          <div class="offene-frage-wrap">
            <label class="offene-frage-label" for="offeneFrage">
              Noch etwas unklar? <span class="offene-frage-optional">(optional)</span>
            </label>
            <textarea
              id="offeneFrage"
              class="offene-frage-textarea"
              placeholder="z.B. „Den Pygmalion-Effekt habe ich noch nicht ganz verstanden …""
              maxlength="400"
              rows="3"
            ></textarea>
          </div>
          <button class="submit-btn" onclick="submitAll()">Antworten senden</button>
        </div>

      </div><!-- /content-inner -->
    </main>
  </div>

  <div id="app-footer"></div>

  <div class="overlay hidden" id="doneOverlay">
    <div class="overlay-card">
      <div class="done-check">✓</div>
      <h2>Übermittelt</h2>
      <p>Die Antworten wurden gespeichert.</p>
      <button class="overlay-btn" onclick="resetTest()">Nochmal mitmachen</button>
    </div>
  </div>

  <script type="module" src="../../meta/firebase.js"></script>
  <script src="../../meta/questions.js"></script>
  <script src="test.js"></script>
  <script src="../../meta/components/components.js"></script>
</body>
</html>
