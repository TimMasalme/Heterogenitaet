<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LdL · Auswertung · Heterogenität</title>  <link rel="stylesheet" href="../../meta/styles.css" />
  <link rel="stylesheet" href="../../meta/components/components.css" />
  <link rel="stylesheet" href="stats.css" />
</head>
<body class="app-shell stats-page">

  <div id="app-topbar"></div>

  <!-- Firebase-Verbindungsfehler (wird per JS eingeblendet) -->
  <div id="firebaseErrorBanner" style="
    display:none; background:#C1440E; color:#fff;
    text-align:center; padding:10px 16px;
    font-family:'DM Sans',sans-serif; font-size:.88rem;
    position:sticky; top:66px; z-index:100;
  "></div>

  <div class="layout">
    <div class="sidebar-slot"></div>

    <main class="content">
      <div class="content-inner">

        <div class="loading-state" id="loadingState">
          <div class="spinner"></div>
          <p>Lade Ergebnisse…</p>
        </div>

        <div id="statsContent" class="hidden">
          <div class="kpi-row" id="kpiRow"></div>

          <section class="section">
            <h2 class="section-title">Gesamtübersicht</h2>
            <div class="card chart-card">
              <div class="chart-legend">
                <span class="legend-dot dot-correct"></span> Richtig
                <span class="legend-dot dot-wrong"></span> Falsch
                <span class="legend-dot dot-total"></span> Gesamt
              </div>
              <div class="chart-wrap" id="bigChart"></div>
            </div>
          </section>

          <section class="section">
            <h2 class="section-title">Fragen im Detail</h2>
            <div id="qBreakdown"></div>
          </section>

          <section class="section">
            <h2 class="section-title">Themengebiete</h2>
            <div class="theme-grid" id="themeGrid"></div>
          </section>

          <section class="section">
            <h2 class="section-title">Antwortverteilung</h2>
            <p class="section-hint">Hover über einen Buchstaben für den vollständigen Antworttext</p>
            <div id="distribList"></div>
          </section>

          <section class="section">
            <h2 class="section-title">Anonyme Fragen</h2>
            <p class="section-hint">Eingereichte Fragen von Studierenden – live aktualisiert</p>
            <div id="fragenList">
              <div class="fragen-empty" id="fragenEmpty">Noch keine Fragen eingereicht.</div>
            </div>
            <div class="fragen-actions" id="fragenActions" style="display:none">
              <button class="btn-danger-sm" onclick="confirmDeleteFragen()">Alle Fragen löschen</button>
            </div>
          </section>
        </div><!-- /statsContent -->

      </div><!-- /content-inner -->
    </main>
  </div>

  <div id="app-footer"></div>

  <script type="module" src="../../meta/firebase.js"></script>
  <script src="../../meta/questions.js"></script>
  <script src="stats.js"></script>
  <script src="../../meta/components/components.js"></script>
</body>
</html>
