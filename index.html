<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LdL · Heterogenität an Schulen</title>  <link rel="stylesheet" href="meta/components/components.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'DM Sans', sans-serif; }

    body {
      background: #03111c;
      color: #fff;
      min-height: 100vh;
      padding-top: 66px;
      overflow-x: hidden;
    }

    /* Soft vignette glow — no grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 10%, rgba(0,103,120,.28) 0%, transparent 65%),
        radial-gradient(ellipse 60% 50% at 85% 90%, rgba(0,53,96,.45) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    #app-topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 200; }
    #app-footer { position: relative; z-index: 1; }

    /* ── PAGE LAYOUT ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: calc(100vh - 66px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 56px 32px 72px;
      gap: 64px;
    }

    /* ── HEADER — compact, not dominant ── */
    .lede {
      text-align: center;
    }

    .lede-eyebrow {
      font-size: .7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .2em;
      color: rgba(255,255,255,.3);
      margin-bottom: 16px;
    }

    .lede-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 400;
      color: rgba(255,255,255,.85);
      line-height: 1.2;
    }

    .lede-title em {
      font-style: italic;
      color: #8dae10;
    }

    /* ── CARDS — the centrepiece ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      width: 100%;
      max-width: 960px;
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      border-radius: 24px;
      padding: 48px 36px 40px;
      text-decoration: none;
      color: #fff;
      overflow: hidden;
      transition: transform .22s cubic-bezier(.22,1,.36,1), box-shadow .22s;
      min-height: 320px;
    }

    /* Glass surfaces */
    .card-test {
      background: linear-gradient(145deg, rgba(0,103,120,.55) 0%, rgba(0,53,96,.4) 100%);
      border: 1px solid rgba(0,180,200,.22);
      box-shadow: 0 0 0 0 rgba(0,103,120,0);
    }

    .card-learn {
      background: linear-gradient(145deg, rgba(90,120,8,.55) 0%, rgba(0,53,96,.38) 100%);
      border: 1px solid rgba(141,174,16,.22);
      box-shadow: 0 0 0 0 rgba(141,174,16,0);
    }

    .card-stats {
      background: linear-gradient(145deg, rgba(0,30,60,.6) 0%, rgba(0,15,35,.5) 100%);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 0 0 0 rgba(0,53,96,0);
    }

    .card:hover {
      transform: translateY(-8px) scale(1.01);
    }

    .card-test:hover  { box-shadow: 0 24px 60px rgba(0,103,120,.35); border-color: rgba(0,180,200,.4); }
    .card-learn:hover { box-shadow: 0 24px 60px rgba(141,174,16,.3); border-color: rgba(141,174,16,.4); }
    .card-stats:hover { box-shadow: 0 24px 60px rgba(0,53,96,.4); border-color: rgba(255,255,255,.18); }

    /* Subtle inner shimmer */
    .card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.25), transparent);
    }

    .card-tag {
      font-size: .65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .18em;
      margin-bottom: auto;
      padding-bottom: 32px;
    }

    .card-test  .card-tag { color: #5ed4e0; }
    .card-learn .card-tag { color: #b8d84c; }
    .card-stats .card-tag { color: rgba(255,255,255,.35); }

    .card-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.7rem, 2.5vw, 2.2rem);
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: 14px;
    }

    .card-desc {
      font-size: .82rem;
      color: rgba(255,255,255,.45);
      line-height: 1.65;
      margin-bottom: 32px;
    }

    .card-arrow {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      transition: gap .2s;
    }

    .card-test  .card-arrow { color: #5ed4e0; }
    .card-learn .card-arrow { color: #b8d84c; }
    .card-stats .card-arrow { color: rgba(255,255,255,.35); }

    .card:hover .card-arrow { gap: 16px; }

    .arrow-line {
      width: 28px;
      height: 1px;
      background: currentColor;
      position: relative;
      transition: width .2s;
    }

    .arrow-line::after {
      content: '';
      position: absolute;
      right: 0; top: -3px;
      width: 7px; height: 7px;
      border-right: 1.5px solid currentColor;
      border-top: 1.5px solid currentColor;
      transform: rotate(45deg);
    }

    .card:hover .arrow-line { width: 40px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      .cards { grid-template-columns: 1fr 1fr; max-width: 680px; }
      .card-stats { grid-column: 1 / -1; min-height: 200px; }
    }

    @media (max-width: 560px) {
      .page { padding: 40px 20px 56px; gap: 44px; }
      .cards { grid-template-columns: 1fr; max-width: 420px; }
      .card-stats { grid-column: auto; }
      .card { min-height: 240px; padding: 36px 28px 32px; }
    }
  </style>
</head>
<body>

  <div id="app-topbar"></div>

  <main class="page">

    <div class="lede">
      <p class="lede-eyebrow">Heterogenität an Schulen</p>
      <h1 class="lede-title">Lernen durch <em>Lehren</em></h1>
    </div>

    <nav class="cards">

      <a href="tabs/test/test.html" class="card card-test">
        <span class="card-tag">Kurstest</span>
        <h2 class="card-title">Multiple-<br>Choice-<br>Fragen</h2>
        <p class="card-desc">Anonym einreichen nach den Präsentationen.</p>
        <span class="card-arrow">
          <span class="arrow-line"></span>
          Öffnen
        </span>
      </a>

      <a href="tabs/learn/learn.html" class="card card-learn">
        <span class="card-tag">Lernmodus</span>
        <h2 class="card-title">Üben &<br>Vorbereiten</h2>
        <p class="card-desc">Zufällige Fragen mit Sofort-Feedback.</p>
        <span class="card-arrow">
          <span class="arrow-line"></span>
          Öffnen
        </span>
      </a>

      <a href="tabs/stats/stats.html" class="card card-stats">
        <span class="card-tag">Nur Lehrende</span>
        <h2 class="card-title">Live-<br>Auswertung</h2>
        <p class="card-desc">Echtzeit-Statistik für den Beamer.</p>
        <span class="card-arrow">
          <span class="arrow-line"></span>
          Öffnen
        </span>
      </a>

    </nav>

  </main>

  <div id="app-footer"></div>

  <script src="meta/components/components.js"></script>
</body>
</html>
