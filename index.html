<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LdL · Heterogenität an Schulen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="meta/styles.css" />
  <link rel="stylesheet" href="meta/components/components.css" />
  <style>
    .hub-screen {
      min-height: calc(100vh - 66px - 48px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
    }
    .hub-card {
      background: white;
      border-radius: 18px;
      padding: 52px 44px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(26,22,18,.11);
      text-align: center;
    }
    .hub-links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 32px;
    }
    .hub-link {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #f5f7f9;
      border: 2px solid #e5e9ee;
      border-radius: 12px;
      padding: 18px 22px;
      text-decoration: none;
      color: #13212c;
      font-family: 'DM Sans', sans-serif;
      transition: border-color .15s, background .15s, transform .12s;
      text-align: left;
    }
    .hub-link:hover {
      border-color: #006778;
      background: rgba(0,103,120,.04);
      transform: translateX(4px);
    }
    .hub-link-icon { font-size: 1.5rem; flex-shrink: 0; }
    .hub-link-title { font-weight: 600; font-size: .95rem; margin-bottom: 2px; }
    .hub-link-sub   { font-size: .8rem; color: #7b8794; }
    .hub-link.link-stats {
      border-color: rgba(0,103,120,.25);
      background: rgba(0,103,120,.04);
    }
    .hub-link.link-stats:hover {
      border-color: #006778;
      background: rgba(0,103,120,.08);
    }
    @media (max-width: 600px) {
      .hub-card { padding: 32px 20px; }
    }
  </style>
</head>
<body class="app-shell">

  <!-- TOPBAR -->
  <div id="app-topbar"></div>

  <div class="hub-screen">
    <div class="hub-card">
      <p class="eyebrow" style="color:#006778">Übersicht</p>
      <h1 class="title-large">Willkommen zur<br /><em>LdL-Einheit</em></h1>
      <p class="body-text">Wähle einen Bereich:</p>

      <div class="hub-links">
        <a href="tabs/test/test.html" class="hub-link">
          <span class="hub-link-icon">📋</span>
          <div>
            <div class="hub-link-title">Kurstest</div>
            <div class="hub-link-sub">MC-Fragen nach den Präsentationen · anonym abschicken</div>
          </div>
        </a>
        <a href="tabs/learn/learn.html" class="hub-link">
          <span class="hub-link-icon">🎲</span>
          <div>
            <div class="hub-link-title">Lernmodus</div>
            <div class="hub-link-sub">Zufällige Fragen zur Vorbereitung · mit Sofort-Feedback</div>
          </div>
        </a>
        <a href="tabs/stats/stats.html" class="hub-link link-stats">
          <span class="hub-link-icon">📊</span>
          <div>
            <div class="hub-link-title">Auswertung</div>
            <div class="hub-link-sub">Live-Statistik für den Beamer · nur für Lehrende</div>
          </div>
        </a>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div id="app-footer"></div>

  <script src="meta/components/components.js"></script>
</body>
</html>
