<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 · LdL</title>
  <link rel="icon" type="image/svg+xml" href="meta/favicon/heterogenitaet-fav.svg" />
  <link rel="stylesheet" href="meta/components/components.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: #f8fafc; }

    body {
      color: #16212d;
      min-height: 100vh;
      padding-top: 66px;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    #app-topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 200; background: #003560; }
    #app-footer { position: relative; z-index: 1; margin-top: auto; }

    .screen {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }

    .label {
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .15em;
      color: #7b8794;
      margin-bottom: 12px;
    }

    .title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      color: #003560;
      margin-bottom: 32px;
      line-height: 1.2;
    }

    .title em { font-style: italic; color: #8dae10; font-weight: 400; }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #003560;
      border: none;
      border-radius: 12px;
      padding: 16px 32px;
      color: #ffffff;
      text-decoration: none;
      font-size: .92rem;
      font-weight: 600;
      transition: background .2s ease, transform .2s ease;
    }

    .back:hover {
      background: #005b73;
      transform: translateY(-1px);
    }

    .back-arrow {
      width: 20px;
      height: 1px;
      background: currentColor;
      position: relative;
      transition: width .2s;
    }

    .back-arrow::before {
      content: '';
      position: absolute;
      left: 0; top: -3px;
      width: 7px; height: 7px;
      border-left: 1.5px solid currentColor;
      border-bottom: 1.5px solid currentColor;
      transform: rotate(45deg);
    }

    .back:hover .back-arrow { width: 26px; }
  </style>
</head>
<body>

  <div id="app-topbar"></div>

  <main class="screen">
    <p class="label">Fehler 404</p>
    <h1 class="title">Diese Seite<br><em>existiert nicht.</em></h1>
    <a href="index.html" class="back">
      <span class="back-arrow"></span>
      Zurück zur Startseite
    </a>
  </main>

  <div id="app-footer"></div>

  <script src="meta/components/components.js"></script>
</body>
</html>
